---
# update_upgrade.yml
# Detects the package manager on each host and runs the appropriate
# update + upgrade. Supports apt (Debian/Ubuntu), apk (Alpine Linux),
# dnf (RHEL/Fedora/CentOS), and pacman (Arch Linux).
# Prints per-host upgrade counts and full command output.

- name: Update and upgrade all LXC containers and VMs
  hosts: all
  gather_facts: true
  gather_subset:
  - pkg_mgr
  - distribution
  become: true

  tasks:

  #  APT  (Debian / Ubuntu)

  - name: "[apt] Update package cache"
    ansible.builtin.apt:
      update_cache: true
      cache_valid_time: 0 # always refresh
    when: ansible_pkg_mgr == "apt"

  - name: "[apt] Collect upgradable package list (apt-get --simulate)"
    ansible.builtin.command:
      # -q suppresses progress noise but keeps Inst/Conf lines WITH [old-ver] brackets.
      # --quiet=2 strips the brackets, losing the old version — do not use it here.
      cmd: apt-get dist-upgrade --simulate -q
    register: apt_simulate
    changed_when: false
    when: ansible_pkg_mgr == "apt"

  - name: "[apt] Run dist-upgrade"
    ansible.builtin.apt:
      upgrade: dist
      autoremove: true
      autoclean: true
    register: apt_upgrade_result
    when: ansible_pkg_mgr == "apt"

  #  APK  (Alpine Linux)

  - name: "[apk] Update package index"
    ansible.builtin.command:
      cmd: apk update
    register: apk_update_result
    changed_when: false
    when: ansible_pkg_mgr == "apk"

  - name: "[apk] Collect upgradable packages (apk upgrade --simulate)"
    ansible.builtin.command:
      cmd: apk upgrade --simulate
    register: apk_simulate
    changed_when: false
    when: ansible_pkg_mgr == "apk"

  - name: "[apk] Run upgrade"
    ansible.builtin.command:
      cmd: apk upgrade
    register: apk_upgrade_result
    changed_when: "'Upgrading' in apk_upgrade_result.stdout or 'Installing' in apk_upgrade_result.stdout"
    when: ansible_pkg_mgr == "apk"

  #  DNF  (RHEL / Fedora / CentOS Stream)

  - name: "[dnf] Update package cache"
    ansible.builtin.command:
      cmd: dnf makecache --quiet
    register: dnf_makecache_result
    changed_when: false
    when: ansible_pkg_mgr == "dnf"

  - name: "[dnf] Check for available upgrades (dnf check-update)"
    ansible.builtin.command:
      cmd: dnf check-update --quiet
    register: dnf_check
    # dnf check-update exits 100 when updates are available, 0 when none
    changed_when: false
    failed_when: dnf_check.rc not in [0, 100]
    when: ansible_pkg_mgr == "dnf"

  - name: "[dnf] Run upgrade"
    ansible.builtin.dnf:
      name: "*"
      state: latest
      autoremove: true
    register: dnf_upgrade_result
    when: ansible_pkg_mgr == "dnf"

  #  PACMAN  (Arch Linux)

  - name: "[pacman] Sync package database"
    ansible.builtin.command:
      cmd: pacman -Sy --noconfirm
    register: pacman_sync_result
    changed_when: false
    when: ansible_pkg_mgr == "pacman"

  - name: "[pacman] Collect upgradable packages (pacman -Qu)"
    ansible.builtin.command:
      cmd: pacman -Qu
    register: pacman_simulate
    changed_when: false
    # pacman -Qu exits 1 when no updates are available
    failed_when: pacman_simulate.rc not in [0, 1]
    when: ansible_pkg_mgr == "pacman"

  - name: "[pacman] Run system upgrade"
    ansible.builtin.command:
      cmd: pacman -Su --noconfirm
    register: pacman_upgrade_result
    changed_when: "'upgraded' in pacman_upgrade_result.stdout"
    when: ansible_pkg_mgr == "pacman"

  #  Unsupported package manager — warn and skip

  - name: "Warn on unsupported package manager"
    ansible.builtin.debug:
      msg: >
        Host {{ inventory_hostname }} uses '{{ ansible_pkg_mgr }}' which is not handled by this playbook. Skipping.
    when: ansible_pkg_mgr not in ["apt", "apk", "dnf", "pacman"]

  #  Reboot handling

  - name: "Check if reboot is required (apt)"
    ansible.builtin.stat:
      path: /var/run/reboot-required
    register: reboot_required_file
    when: ansible_pkg_mgr == "apt"

  - name: "Check if reboot is required (apk/Alpine)"
    ansible.builtin.command:
      cmd: ash -c "[ -f /var/run/reboot-required ] && echo yes || echo no"
    register: alpine_reboot_check
    changed_when: false
    when: ansible_pkg_mgr == "apk"

  - name: "Set reboot_needed fact"
    ansible.builtin.set_fact:
      reboot_needed: >-
        {{
          (ansible_pkg_mgr == "apt" and reboot_required_file.stat.exists) or
          (ansible_pkg_mgr == "apk" and alpine_reboot_check.stdout | default('no') == 'yes')
        }}

  - name: "Schedule delayed reboot after 16:00 (vm-debian-remote-desktop only)"
    ansible.builtin.command:
      cmd: shutdown -r 16:00 "Scheduled reboot by Ansible after package upgrade"
    when:
    - reboot_needed
    - inventory_hostname == "vm-debian-remote-desktop"
    changed_when: true

  - name: "Reboot immediately if required (all other hosts)"
    ansible.builtin.reboot:
      msg: "Rebooting after package upgrade"
      reboot_timeout: 300
    when:
    - reboot_needed
    - inventory_hostname != "vm-debian-remote-desktop"

  - name: "Report reboot status"
    ansible.builtin.debug:
      msg: >-
        {{ inventory_hostname }}: {{ 'REBOOT SCHEDULED after 16:00' if inventory_hostname == 'vm-debian-remote-desktop' and reboot_needed
            else 'REBOOTED' if reboot_needed
            else 'no reboot needed' }}

  # ------------------------------------------------------------------ #
  # SUMMARY — per-host upgrade report
  # ------------------------------------------------------------------ #

  - name: "[summary] Get root filesystem free space"
    ansible.builtin.shell:
      cmd: df -h / | awk 'NR==2 {print $4}'
    register: _df_avail
    changed_when: false

  # APT: parse the simulate dry-run output directly.
  # Format: Inst pkg [old-ver] (new-ver repo [arch])   <- upgrade (has [old])
  #         Inst pkg (new-ver repo [arch]) []           <- new install (no [old])
  # We only want upgrade lines where $3 starts with '[' — the old version.
  # Written to a temp file via copy module to avoid heredoc + pipelining conflicts
  # (pipelining = True in ansible.cfg causes 'python3 - << EOF' stdin collisions).
  - name: "[summary] APT — write simulate output to temp file"
    ansible.builtin.copy:
      content: "{{ apt_simulate.stdout | default('') }}"
      dest: /tmp/_ansible_apt_sim.txt
      mode: "0600"
    changed_when: false
    when: ansible_pkg_mgr == "apt"

  - name: "[summary] APT — extract per-package version changes from simulate output"
    ansible.builtin.shell:
      cmd: |
        awk '/^Inst / && $3 ~ /^\[/ {
          n=$2; sub(/:.*/, "", n)
          old=$3; gsub(/[\[\]]/, "", old)
          new=$4; gsub(/[()]/, "", new)
          if (!(n in seen)) { seen[n]=1; printf "  %-36s %s  ->  %s\n", n, old, new }
        }
        END { if (length(seen)==0) print "  (none - already up to date)" }' \
        /tmp/_ansible_apt_sim.txt
    register: _apt_versions
    changed_when: false
    when: ansible_pkg_mgr == "apt"

  - name: "[summary] APT — cleanup simulate temp file"
    ansible.builtin.file:
      path: /tmp/_ansible_apt_sim.txt
      state: absent
    when: ansible_pkg_mgr == "apt"

  - name: "[summary] APT — set summary facts"
    ansible.builtin.set_fact:
      _pkg_versions: "{{ _apt_versions.stdout | default('  (none)') }}"
      _pkg_count: "{{ _apt_versions.stdout_lines | default([]) | select('search', '->') | list | length }}"
      # simulate -q (not -qq) includes the 'Need to get X MB' line
      _upgrade_size: >-
        {{ apt_simulate.stdout | default('')
           | regex_findall('Need to get ([0-9.,]+ [kMGTP]?B)')
           | first | default('N/A') }}
    when: ansible_pkg_mgr == "apt"

  # APK: parse the real upgrade output (contains old → new per package)
  - name: "[summary] APK — write upgrade output to temp file"
    ansible.builtin.copy:
      content: "{{ apk_upgrade_result.stdout | default('') }}"
      dest: /tmp/_ansible_apk_upgrade.txt
      mode: "0600"
    changed_when: false
    when: ansible_pkg_mgr == "apk"

  - name: "[summary] APK — extract per-package version changes"
    ansible.builtin.shell:
      cmd: |
        awk '/Upgrading/ {
          name=$3
          old=$4; gsub(/[()]/, "", old)
          new=$6; gsub(/[()]/, "", new)
          count++
          printf "  %-36s %s  ->  %s\n", name, old, new
        }
        END { if (count == 0) print "  (none — already up to date)" }' \
        /tmp/_ansible_apk_upgrade.txt
    register: _apk_versions
    changed_when: false
    when: ansible_pkg_mgr == "apk"

  - name: "[summary] APK — cleanup temp file"
    ansible.builtin.file:
      path: /tmp/_ansible_apk_upgrade.txt
      state: absent
    when: ansible_pkg_mgr == "apk"

  - name: "[summary] APK — set summary facts"
    ansible.builtin.set_fact:
      _pkg_versions: "{{ _apk_versions.stdout | default('  (none)') }}"
      _pkg_count: "{{ _apk_versions.stdout_lines | default([]) | select('search', '->') | list | length }}"
      _upgrade_size: "N/A"
    when: ansible_pkg_mgr == "apk"

  # DNF: write Python script via copy module then execute.
  # Avoids pipelining+heredoc stdin collision (pipelining=True in ansible.cfg).
  - name: "[summary] DNF — write version diff script"
    ansible.builtin.copy:
      dest: /tmp/_ansible_dnf_diff.py
      mode: "0700"
      content: |
        import subprocess, re, sys
        out = subprocess.run(['dnf','history','info','last'], capture_output=True, text=True).stdout
        upgraded, upgrade, state = {}, {}, None
        for line in out.splitlines():
            ls = line.strip()
            if ls.startswith('Upgraded') and ':' in ls: state = 'old'; continue
            if ls.startswith('Upgrade') and 'Upgraded' not in ls and ':' in ls: state = 'new'; continue
            if state and ls and not ls[0].isupper() and not ls.startswith('<'):
                m = re.match(r'^(.+)-(\d[^-]+-[^-.]+)\.\w+$', ls)
                if m:
                    (upgraded if state == 'old' else upgrade)[m.group(1)] = m.group(2)
        if not upgrade:
            print('  (none - already up to date)')
        else:
            for n in sorted(upgrade):
                print(f'  {n:<36} {upgraded.get(n,"?")}  ->  {upgrade[n]}')
    changed_when: false
    when: ansible_pkg_mgr == "dnf"

  - name: "[summary] DNF — extract per-package version changes"
    ansible.builtin.command:
      cmd: python3 /tmp/_ansible_dnf_diff.py
    register: _dnf_versions
    changed_when: false
    when: ansible_pkg_mgr == "dnf"

  - name: "[summary] DNF — cleanup script"
    ansible.builtin.file:
      path: /tmp/_ansible_dnf_diff.py
      state: absent
    when: ansible_pkg_mgr == "dnf"

  - name: "[summary] DNF — set summary facts"
    ansible.builtin.set_fact:
      _pkg_versions: "{{ _dnf_versions.stdout | default('  (none)') }}"
      _pkg_count: "{{ _dnf_versions.stdout_lines | default([]) | select('search', '->') | list | length }}"
      _upgrade_size: "N/A"
    when: ansible_pkg_mgr == "dnf"

  # Pacman: write Python script via copy module then execute.
  # Avoids pipelining+heredoc stdin collision (pipelining=True in ansible.cfg).
  - name: "[summary] Pacman — write version diff script"
    ansible.builtin.copy:
      dest: /tmp/_ansible_pac_diff.py
      mode: "0700"
      content: |
        import re, sys
        try:
            lines = open('/var/log/pacman.log').readlines()
        except FileNotFoundError:
            print('  (pacman log not found)'); sys.exit(0)
        pkgs = []
        for line in reversed(lines):
            m = re.match(r'\[.+\] \[ALPM\] upgraded (\S+) \((.+) -> (.+)\)', line.rstrip())
            if m: pkgs.append(m.groups())
            elif '[ALPM] transaction started' in line and pkgs: break
        if not pkgs:
            print('  (none - already up to date)')
        else:
            for n, o, new in reversed(pkgs):
                print(f'  {n:<36} {o}  ->  {new}')
    changed_when: false
    when: ansible_pkg_mgr == "pacman"

  - name: "[summary] Pacman — extract per-package version changes"
    ansible.builtin.command:
      cmd: python3 /tmp/_ansible_pac_diff.py
    register: _pacman_versions
    changed_when: false
    when: ansible_pkg_mgr == "pacman"

  - name: "[summary] Pacman — cleanup script"
    ansible.builtin.file:
      path: /tmp/_ansible_pac_diff.py
      state: absent
    when: ansible_pkg_mgr == "pacman"

  - name: "[summary] Pacman — set summary facts"
    ansible.builtin.set_fact:
      _pkg_versions: "{{ _pacman_versions.stdout | default('  (none)') }}"
      _pkg_count: "{{ _pacman_versions.stdout_lines | default([]) | select('search', '->') | list | length }}"
      _upgrade_size: >-
        {{ pacman_upgrade_result.stdout | default('')
           | regex_findall('Net Upgrade Size:\s+([0-9.]+ \S+)')
           | first | default('N/A') }}
    when: ansible_pkg_mgr == "pacman"

  - name: "[summary] Fallback for unsupported package managers"
    ansible.builtin.set_fact:
      _pkg_versions: "  (unsupported package manager: {{ ansible_pkg_mgr }})"
      _pkg_count: 0
      _upgrade_size: "N/A"
    when: ansible_pkg_mgr not in ["apt", "apk", "dnf", "pacman"]

  - name: "[summary] Upgrade report — {{ inventory_hostname }}"
    ansible.builtin.debug:
      msg: "{{
        ['════════════════════════════════════════════════',
         'UPGRADE SUMMARY  ▸  ' + inventory_hostname,
         'OS           : ' + ansible_distribution + ' ' + ansible_distribution_version,
         'Packages (' + _pkg_count | string + '):']
        + _pkg_versions.splitlines()
        + ['Upgrade size : ' + _upgrade_size,
           'Disk free (/) : ' + (_df_avail.stdout | trim),
           'Reboot       : ' + ('REBOOT' if reboot_needed else 'NOT NEEDED'),
           '════════════════════════════════════════════════']
      }}"
