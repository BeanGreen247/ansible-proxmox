---
# host_vars/lxc-optiping/main.yml

cis_ufw_extra_ports:
- { port: "8080", proto: "tcp", comment: "Optiping web UI" }

# OptiPing deployment vars (used by deploy-optiping.yml)
# Vault vars go in vault.yml: vault_optiping_password, vault_optiping_admin_password, vault_optiping_totp_secret
optiping_repo_version: master   # branch or tag to deploy
optiping_port: 8080
optiping_title: "OptiPing Status"
optiping_timezone: "Europe/London"   # adjust to your local TZ
optiping_auth_enabled: false         # set true to require login
optiping_auth_username: admin
optiping_retention_days: 90

# Add your monitors here:
optiping_monitors:
- { name: "Proxmox",         target: "192.168.0.222",    interval: 30 }
- { name: "Grafana",         target: "192.168.0.247:3000" }
- { name: "Prometheus",      target: "192.168.0.248:9090" }
- { name: "Google DNS",      target: "8.8.8.8",          interval: 60 }
- { name: "Cloudflare DNS",  target: "1.1.1.1",          interval: 60 }
