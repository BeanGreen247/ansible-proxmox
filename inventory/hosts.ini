# inventory/hosts.ini
# -----------------------------------------------------------------------
# Proxmox bare-metal server(s)
# Used by: pve_vm_status.yml, create-vm-from-iso-proxmox.yml,
#          fetch-iso.yml, build-debian-preseed-iso.yml,
#          setup-base-ansible-proxmox.yml
# -----------------------------------------------------------------------
[proxmox-bms]
proxmox-vm-bm-machine ansible_port=22 ansible_host=192.168.0.222 ansible_user=ansibleuser ansible_ssh_private_key_file=~/.ssh/id_rsa

