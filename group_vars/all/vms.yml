#  preseed_install: true
#  # preseed_hostname: "my-auto-vm"    # omit to use 'name' above as hostname
#  # preseed_ip: "192.168.0.x"         # omit for DHCP
#  # preseed_gateway: "192.168.0.1"    # required if preseed_ip is set

# Preseed auto-install example (active)
# Uses the ISO built by build-debian-preseed-iso.yml
# Managed by: auto-install-debian.yml + setup-debian-base.yml
- name: "ansible-debian-01"
  vmid: 500
  # Boot from ISO first, then disk (preseed auto-install)
  boot: "order=ide2;scsi0;net0"
  bootdisk: scsi0
  onboot: false
  memory: 1024
  cores: 2
  net0: "virtio,bridge=vmbr0"
  ostype: "l26"
  agent: 1
  disk_size_gb: 32
  storage: "local-lvm"
  iso_storage: "local"
  iso_path: "iso/"
  # Reference the preseed ISO built by build-debian-preseed-iso.yml
  iso_file: "debian-13-amd64-preseed.iso"
  # Preseed install flags
  # Set to true to include this VM in auto-install-debian.yml
  preseed_install: true
  # ip_address is OPTIONAL - if omitted, the IP is auto-discovered via
  # the qemu-guest-agent after install (recommended).
  # Set it if you have a known static IP or DHCP reservation.
  # ip_address: "192.168.0.50"
  # Optional: static IP injected into the preseed (uncomment to use)
  preseed_ip: "192.168.0.206"
  preseed_gateway: "192.168.0.1"
  preseed_hostname: "dev-debian-01"
