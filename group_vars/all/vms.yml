# MINIMUM — Automated preseed install VM
#   Fully unattended Debian install via the preseed pipeline.
#   Requires: build-debian-preseed-iso.yml run first.
#   Boot order must start with ide2 (the preseed ISO).
#   preseed_hostname defaults to the VM name if omitted or left empty.
#- name: "my-auto-vm"
